services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-profile-prototype-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: personal_profile_prototype
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_profile_prototype"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: