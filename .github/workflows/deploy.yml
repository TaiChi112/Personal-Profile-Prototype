name: Deploy to Google Cloud and Azure

on:
  push:
    branches:
      - main

jobs:
  # 🏭 Job 1: โรงงานประกอบตู้ (ทำบนเครื่องเซิร์ฟเวอร์สุดแรงของ GitHub)
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/taichi112/personal-profile-app:latest

  # 🚚 Job 2: หุ่นยนต์ส่งของไปที่ Google Cloud (GCP)
  deploy-gcp:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to GCP via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            cd ~/personal-profile-prototype
            git fetch --all
            git reset --hard origin/main

            docker compose -f docker-compose.prod.yml down
            docker system prune -af --volumes
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d

  # 🚀 Job 3: หุ่นยนต์ส่งของไปที่ Azure (ฐานทัพใหม่ - RAM 1GB)
  deploy-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check if Secret is Empty
        run: |
          if [ -z "${{ secrets.AZURE_SSH_KEY }}" ]; then
            echo "🚨 พังพินาศ! หุ่นยนต์มองไม่เห็นกุญแจ AZURE_SSH_KEY"
            exit 1
          else
            echo "✅ เยี่ยม! หุ่นยนต์เจอกุญแจแล้ว"
          fi

      - name: Deploying to Azure via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            cd ~/personal-profile-prototype
            git pull origin main

            # ท่าไม้ตายสำหรับ Server สเปคน้อย (B1s - RAM 1GB)
            # ต้องปิดของเก่าทิ้งก่อนค่อยโหลดของใหม่ เพื่อไม่ให้ RAM ชนเพดาน

            echo "🛑 1. ปิดระบบตัวเก่าก่อนเพื่อคืน RAM ให้ Server..."
            docker compose -f docker-compose.prod.yml down

            echo "🧹 2. ล้างขยะ Image เก่าทิ้งให้หมด เพื่อเอาพื้นที่คืน..."
            docker system prune -af --volumes

            echo "🔑 3. ล็อกอินเข้า GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📥 4. โหลดตู้ใบใหม่ล่าสุด..."
            docker compose -f docker-compose.prod.yml pull app

            echo "🚀 5. รันระบบใหม่!"
            docker compose -f docker-compose.prod.yml up -d
