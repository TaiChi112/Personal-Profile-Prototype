name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: personal_profile_prototype
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d personal_profile_prototype"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:123456@localhost:5432/personal_profile_prototype
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      ADMIN_TEST_EMAIL: admin@example.com
      ADMIN_TEST_PASSWORD: admin123
      VIEWER_TEST_PASSWORD: viewer123
      APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate
        run: bun run prisma:generate

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: Seed database
        run: bun run prisma:seed

      - name: Integration auth+db
        run: bun run integration:auth-db

      - name: Build
        run: bun run build

      - name: Start app server (temporary)
        run: |
          bun run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

      - name: Wait for app ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:3000/api/auth/session >/dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time"
          cat /tmp/next-dev.log
          exit 1

      - name: Integration HTTP CRUD
        run: bun run integration:http-crud

      - name: Integration HTTP admin users
        run: bun run integration:http-admin-users

      - name: Stop app server
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" || true
          fi
