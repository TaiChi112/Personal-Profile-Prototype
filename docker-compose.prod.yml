services:
  app:
    image: ghcr.io/taichi112/personal-profile-app:latest
    container_name: personal-profile-app-prod
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production

      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}

      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

      ADMIN_TEST_EMAIL: ${ADMIN_TEST_EMAIL}
      ADMIN_TEST_PASSWORD: ${ADMIN_TEST_PASSWORD}
      VIEWER_TEST_PASSWORD: ${VIEWER_TEST_PASSWORD}
      OWNER_EMAIL: ${OWNER_EMAIL}

      SERVER_NODE: ${SERVER_NODE}
    networks:
      - app-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: personal-profile-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - app-network-prod

  certbot:
    image: certbot/certbot
    container_name: personal-profile-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

networks:
  app-network-prod:
    driver: bridge
