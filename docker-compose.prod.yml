version: '3.8'

services:
  # มีแค่ Next.js Application ตัวเดียวพอ เพราะ DB อยู่ที่ Supabase แล้ว
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: personal-profile-app-prod
    restart: always
    environment:
      # ให้มันอ่านค่า DATABASE_URL จากไฟล์ .env โดยตรง
      DATABASE_URL: ${DATABASE_URL}
      
      # Next.js
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      
      # Auth Providers (ถ้ามี)
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      GOOGLE_ID: ${GOOGLE_ID}
      GOOGLE_SECRET: ${GOOGLE_SECRET}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - app-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  app-network-prod:
    driver: bridge