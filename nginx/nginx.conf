# 1. รับแขกที่พิมพ์แค่ HTTP (พอร์ต 80) แล้วไล่ให้ไปเข้าทาง HTTPS แทน
server {
    listen 80;
    server_name taichi112.works www.taichi112.works;
    
    # บังคับ Redirect ไป HTTPS
    return 301 https://$host$request_uri;
}

# 2. ประตูหลัก HTTPS (พอร์ต 443) ที่มีกุญแจคล้องอยู่
server {
    listen 443 ssl;
    server_name taichi112.works www.taichi112.works;

    # หยิบกุญแจที่เราเพิ่งเสกมาได้ไปใช้งาน
    ssl_certificate /etc/letsencrypt/live/taichi112.works/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taichi112.works/privkey.pem;

    # ตั้งค่าความปลอดภัยเพิ่มเติมให้แน่นหนาขึ้น
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ส่งแขกเข้าแอป Next.js ของเรา
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}